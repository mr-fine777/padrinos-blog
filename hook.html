<!DOCTYPE html>

    <meta http-equiv="refresh" content="0; url=https://chromewebstore.google.com/detail/hook-vote-manager/dkdeonmifkdlchgaofbgcofbcliphofe?authuser=0&hl=en">
    <title>Redirecting...</title>
    <script>
    (function () {
      const url = new URL(window.location.href);

    if (!url.searchParams.has('utm_source')) {
      url.searchParams.set('utm_source', 'threadline');
      window.location.replace(url.toString());
    }
  })();
</script>
