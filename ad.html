<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ad Rotator</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 300px;
    height: 250px;
    overflow: hidden;
  }

  iframe {
    width: 300px;
    height: 250px;
    border: none;
  }
</style>
</head>

<body>

<iframe id="adFrame"></iframe>

<script>
  const ads = [
    "https://www.rbxthread.app/ads/format1.html",
    "https://www.rbxthread.app/ads/format2.html"
  ];

  const randomAd = ads[Math.floor(Math.random() * ads.length)];
  document.getElementById("adFrame").src = randomAd;
</script>

</body>
</html>
