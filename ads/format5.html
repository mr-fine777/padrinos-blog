<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sponsored Ad</title>
	<style>
		body {
			font-family: 'BuilderSans', Arial, sans-serif;
			margin: 0;
			padding: 0;
			background: #fff;
			display: flex;
			flex-direction: column;
			align-items: center;
            width: 100vw;
            height: 100vh;
		}
		.top-img {
			width: 100vw;
			height: 100vh;
			object-fit: cover;
			border-radius: 0;
			display: block;
			margin: 0;
		}
	</style>
</head>
<body>
</body>
<script>
// Fetch a random sponsored listing from the API
fetch('https://www.rbxthread.app/api/sponsored')
	.then(r => r.json())
	.then(listings => {
		if (!Array.isArray(listings) || listings.length === 0) return;
		// Pick a random listing from the returned array
		const entry = listings[Math.floor(Math.random() * listings.length)];
		if (!entry) return;
		// Build the Roblox game URL
		const gameUrl = `https://www.roblox.com/games/${entry.placeId}`;
		// Use thumbUrl or thumb1 (fallback)
		const thumb = entry.thumbUrl || entry.thumb1 || '';
		// Create the <a> and <img> elements
		const a = document.createElement('a');
		a.href = gameUrl;
		a.style.display = 'block';
		a.style.width = '100vw';
		a.style.height = '100vh';
		a.style.position = 'relative';
		a.id = 'sponsored-link';
		const img = document.createElement('img');
		img.src = thumb;
		img.alt = entry.title || 'Sponsored';
		img.className = 'top-img';
		a.appendChild(img);
		document.body.appendChild(a);

		// Add iframe for views on page load
		const viewsFrame = document.createElement('iframe');
		viewsFrame.src = `https://www.rbxthread.app/api/views?${entry.placeId}`;
		viewsFrame.style.display = 'none';
		viewsFrame.width = 0;
		viewsFrame.height = 0;
		viewsFrame.title = 'views';
		document.body.appendChild(viewsFrame);

			// On click, track click with fetch (for Firefox compatibility), fallback to iframe if needed
			a.addEventListener('click', function(e) {
				e.preventDefault(); // Prevent immediate navigation
				const clickUrl = `https://www.rbxthread.app/api/clicks?${entry.placeId}`;
				let redirected = false;
				const redirect = () => {
					if (!redirected) {
						redirected = true;
						window.location.href = gameUrl;
					}
				};
				// Try fetch first (works in Firefox/Chrome)
				fetch(clickUrl, {mode: 'no-cors'}).finally(() => {
					setTimeout(redirect, 100); // Short delay to allow request to start
				});
				// Fallback: If fetch fails (e.g., network error), use iframe with postMessage redirect
				setTimeout(() => {
					if (!redirected) {
						const clickFrame = document.createElement('iframe');
						clickFrame.src = clickUrl + '&redirect=1';
						clickFrame.style.display = 'none';
						clickFrame.width = 0;
						clickFrame.height = 0;
						clickFrame.title = 'clicks';
						document.body.appendChild(clickFrame);
						// Listen for postMessage from iframe
						window.addEventListener('message', function handler(event) {
							// Only accept messages from the click tracking domain
							if (event.origin === 'https://www.rbxthread.app' && event.data === 'redirect') {
								window.removeEventListener('message', handler);
								redirect();
							}
						});
						// Fallback: If iframe doesn't message in 1.5s, redirect anyway
						setTimeout(redirect, 1500);
					}
				}, 200);
			});
	});
</script>
</html>
