<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=500, height=280, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html, body {
  width: 500px;
  height: 280px;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

/* Main fixed canvas */
.frame {
  width: 500px;
  height: 280px;
  position: relative;
  overflow: hidden;
}

/* Wrapper for scaling */
.ad-wrapper {
  width: 300px;
  height: 250px;
  position: absolute;
  top: 0px;   /* centers vertically (280 - 250 ≈ 30 / 2) */
  left: 0px; /* centers horizontally (500 - 300 ≈ 200 / 2) */
  transform: scale(0.83, 0.56);
  transform-origin: top left;
}

/* Clean iframe */
.ad-wrapper iframe {
  width: 300px;
  height: 250px;
  border: 0;
  display: block;
}
</style>

</head>

<body>
<div class="frame">
  <div class="ad-wrapper">
    <iframe src="https://www.rbxthread.app/ads/format1"></iframe>
  </div>
</div>

</body>
</html>
