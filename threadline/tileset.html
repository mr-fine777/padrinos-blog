<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Iframe</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
  }

  iframe {
    width: 250px;
    height: 140px;
    border: none;
  }
</style>
</head>
<body>

<iframe id="frame"></iframe>

<script>
const sites = [
  "https://www.padrinos.blog/ads/format4.html",
  "https://www.padrinos.blog/ads/format5.html"
];

const randomSite = sites[Math.floor(Math.random() * sites.length)];
document.getElementById("frame").src = randomSite;
</script>

</body>
</html>
